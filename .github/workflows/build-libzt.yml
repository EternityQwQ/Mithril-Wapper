name: Build libzt (iOS)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-libzt.yml'
    branches:
      - main

jobs:
  build-libzt:
    name: Build libzt for iOS (arm64)
    runs-on: macos-14

    steps:
      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install CMake
        run: brew install cmake

      - name: Checkout libzt source
        run: |
          git clone --depth=1 https://github.com/zerotier/libzt.git /tmp/libzt
          cd /tmp/libzt
          git log -1 --oneline

      - name: Create build directory
        run: mkdir -p /tmp/libzt/build-ios

      - name: Configure CMake (iOS arm64, Service mode)
        working-directory: /tmp/libzt/build-ios
        run: |
          cmake .. \
            -G "Xcode" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DBUILD_SHARED_LIBS=OFF \
            -DZTS_ENABLE_NETWORKNEEDS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_ENABLE_BITCODE=NO \
            -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_FLAGS="-target arm64-apple-ios14.0" \
            -DCMAKE_CXX_FLAGS="-target arm64-apple-ios14.0 -stdlib=libc++"

      - name: Build libzt
        working-directory: /tmp/libzt/build-ios
        run: |
          cmake --build . --config Release --parallel $(sysctl -n hw.ncpu)

      - name: Verify static library
        run: |
          find /tmp/libzt/build-ios -name "*.a" -exec ls -lh {} \;
          find /tmp/libzt/build-ios -name "*.a" -exec file {} \;

      - name: Collect artifacts
        run: |
          mkdir -p /tmp/libzt-artifacts/lib /tmp/libzt-artifacts/include
          LIBZT_PATH=$(find /tmp/libzt/build-ios -path "*/Release-iphoneos/libzt.a" | head -1)
          if [ -z "$LIBZT_PATH" ]; then
            LIBZT_PATH=$(find /tmp/libzt/build-ios -name "libzt.a" | head -1)
          fi
          echo "Found library: $LIBZT_PATH"
          cp "$LIBZT_PATH" /tmp/libzt-artifacts/lib/libzt.a
          cp /tmp/libzt/include/*.h /tmp/libzt-artifacts/include/ 2>/dev/null || true
          cp -r /tmp/libzt/include/* /tmp/libzt-artifacts/include/ 2>/dev/null || true
          ls -la /tmp/libzt-artifacts/lib/
          ls -la /tmp/libzt-artifacts/include/

      - name: Upload libzt.a artifact
        uses: actions/upload-artifact@v4
        with:
          name: libzt-ios-arm64
          path: /tmp/libzt-artifacts/
          retention-days: 90